services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: mediassist_backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./data:/app/data
      - ./vector_store:/app/vector_store

    restart: unless-stopped


  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    container_name: mediassist_frontend

    ports:
      - "8501:8501"

    environment:
      API_URL: http://backend:8000

    volumes:
      - ./data:/app/data
      - ./vector_store:/app/vector_store

    depends_on:
      - backend

    restart: unless-stopped